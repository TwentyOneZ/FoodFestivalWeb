services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flavors-of-brazil-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      SECRET_KEY: "${SECRET_KEY:-change-this-long-random-secret}"
      SITE_URL: "${SITE_URL:-http://127.0.0.1:5000}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////app/instance/flavors.db}"
      UPLOAD_FOLDER: "/app/static/uploads"
      FLASK_DEBUG: "0"
      MAX_CONTENT_LENGTH: "${MAX_CONTENT_LENGTH:-8388608}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      ADMIN_NOTIFICATION_EMAIL: "${ADMIN_NOTIFICATION_EMAIL:-}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-3}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-120}"
    volumes:
      - ./instance:/app/instance
      - ./static/uploads:/app/static/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
